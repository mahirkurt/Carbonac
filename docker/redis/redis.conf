bind 0.0.0.0
protected-mode no
port 6379

# Memory limits — prevent Redis from consuming all system RAM
maxmemory 128mb
maxmemory-policy noeviction

# Persistence — RDB snapshots
save 900 1
save 300 10
save 60 10000

# Do not block writes when RDB snapshot fails (Pi SD card I/O can be unreliable)
stop-writes-on-bgsave-error no
